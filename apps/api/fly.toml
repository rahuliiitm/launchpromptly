app = "planforge-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  API_PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
