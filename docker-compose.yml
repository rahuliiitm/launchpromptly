services:
  postgres:
    image: postgres:16-alpine
    container_name: aiecon-db
    environment:
      POSTGRES_USER: aiecon
      POSTGRES_PASSWORD: aiecon
      POSTGRES_DB: aiecon
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiecon"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: planforge-api
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aiecon:aiecon@postgres:5432/aiecon?schema=public
      PORT: "3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: planforge-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001

volumes:
  pgdata:
