steps:
  # ── Build API image ──
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/launchpromptly/api:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/launchpromptly/api:latest
      - .

  # ── Build Web image ──
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/web/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=$_API_URL
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/launchpromptly/web:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/launchpromptly/web:latest
      - .

  # ── Push images ──
  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "$_REGION-docker.pkg.dev/$PROJECT_ID/launchpromptly/api"]

  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "$_REGION-docker.pkg.dev/$PROJECT_ID/launchpromptly/web"]

  # ── Deploy API to Cloud Run ──
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - launchpromptly-api
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/launchpromptly/api:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3001
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --add-cloudsql-instances=$_DB_CONNECTION
      - --set-secrets=DATABASE_URL=lp-database-url:latest,JWT_SECRET=lp-jwt-secret:latest,ENCRYPTION_KEY=lp-encryption-key:latest
      - --set-env-vars=^||^NODE_ENV=production||API_PORT=3001||CORS_ORIGIN=$_WEB_URL

  # ── Deploy Web to Cloud Run ──
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - launchpromptly-web
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/launchpromptly/web:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=NODE_ENV=production

substitutions:
  _REGION: us-west1
  _API_URL: https://api.launchpromptly.dev
  _WEB_URL: https://launchpromptly.dev
  _DB_CONNECTION: launchpromptly:us-west1:launchpromptly-db

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
