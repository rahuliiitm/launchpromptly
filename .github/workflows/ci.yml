name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aiecon
          POSTGRES_PASSWORD: aiecon
          POSTGRES_DB: aiecon
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U aiecon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aiecon:aiecon@localhost:5433/aiecon?schema=public
      JWT_SECRET: ci-test-secret
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      API_PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Typecheck
        run: npx turbo run typecheck

      - name: Run tests
        run: npx turbo run test

      - name: Build
        run: npx turbo run build

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    env:
      REGION: us-west1
      REGISTRY: us-west1-docker.pkg.dev

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push API image
        run: |
          docker build -f apps/api/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/planforge/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/planforge/api:latest .
          docker push --all-tags ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/planforge/api

      - name: Build and push Web image
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/planforge/web:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/planforge/web:latest .
          docker push --all-tags ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/planforge/web

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy planforge-api \
            --image=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/planforge/api:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy planforge-web \
            --image=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/planforge/web:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed
