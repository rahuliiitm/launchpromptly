name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aiecon
          POSTGRES_PASSWORD: aiecon
          POSTGRES_DB: aiecon
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U aiecon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aiecon:aiecon@localhost:5433/aiecon?schema=public
      JWT_SECRET: ci-test-secret
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      API_PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Typecheck
        run: npx turbo run typecheck

      - name: Run tests
        run: npx turbo run test

      - name: Build
        run: npx turbo run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t planforge-api .

      - name: Build Web Docker image
        run: docker build -f apps/web/Dockerfile -t planforge-web .
